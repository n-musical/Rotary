<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>회전문</title>
<meta name="apple-mobile-web-app-title" content="회전문">
<meta name="application-name" content="회전문">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root {
  --navy: #2D2A6E; --purple: #7C5CBF; --pl: #EDE8FA; --pll: #F7F5FF;
  --bg: #F7F6FF; --sur: #fff; --brd: #E8E6F5;
  --tx: #1A1A2E; --mu: #8888AA; --mu2: #BBBBCC;
  --gn: #2E9E5B; --gnl: #E8F7EE;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--tx); display: flex; justify-content: center; }
.app { width: 100%; height: 100vh; height: 100dvh; background: var(--sur); display: flex; flex-direction: column; overflow: hidden; }
.sc { display: none; flex-direction: column; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 72px; }
.sc.on { display: flex; }
.tbar { position: sticky; top: 0; z-index: 10; background: var(--sur); border-bottom: 1px solid var(--brd); padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
.tbar h2 { font-size: 18px; font-weight: 700; color: var(--navy); }
.bk { font-size: 20px; color: var(--navy); cursor: pointer; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: background .15s; }
.bk:hover { background: var(--pll); }
.rbtn { margin-left: auto; background: var(--navy); color: #fff; border: none; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }
.bnav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--sur); border-top: 1px solid var(--brd); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.ni { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 12px; cursor: pointer; border: none; background: none; font-family: inherit; color: var(--mu2); transition: color .15s; }
.ni.on { color: var(--navy); }
.ni-ico { font-size: 22px; line-height: 1; margin-bottom: 3px; }
.ni-lbl { font-size: 10px; font-weight: 500; }
.stit { padding: 16px 20px 8px; font-size: 11px; font-weight: 700; color: var(--mu); letter-spacing: .1em; text-transform: uppercase; }
.card { margin: 0 20px 10px; background: var(--sur); border: 1.5px solid var(--brd); border-radius: 16px; padding: 16px; cursor: pointer; transition: border-color .15s, box-shadow .15s; }
.card:hover { border-color: var(--purple); box-shadow: 0 4px 20px rgba(124,92,191,.1); }
.addcard { margin: 0 20px 10px; border: 1.5px dashed var(--brd); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; color: var(--mu); font-size: 14px; }
.addcard:hover { border-color: var(--purple); color: var(--purple); }
.tag { display: inline-block; background: var(--pl); color: var(--purple); border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
.banner { margin: 12px 20px; background: var(--pl); border: 1px solid rgba(124,92,191,.2); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: flex-end; justify-content: center; }
.ov.open { display: flex; }
.modal { background: var(--sur); border-radius: 24px 24px 0 0; width: 100%; padding: 24px 20px calc(40px + env(safe-area-inset-bottom)); max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal h3 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 20px; }
.lbl { font-size: 11px; font-weight: 700; color: var(--mu); letter-spacing: .08em; text-transform: uppercase; display: block; margin-bottom: 6px; }
.inp { width: 100%; padding: 12px 14px; border: 1.5px solid var(--brd); border-radius: 10px; font-size: 14px; font-family: inherit; color: var(--tx); background: var(--sur); margin-bottom: 14px; outline: none; }
.inp:focus { border-color: var(--purple); }
.brow { display: flex; gap: 10px; margin-top: 6px; }
.mbtn { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; border: none; }
.mbtn.p { background: var(--navy); color: #fff; }
.mbtn.s { background: var(--bg); color: var(--mu); }
.trow { display: flex; gap: 8px; margin-bottom: 14px; }
.tgl { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--brd); background: var(--sur); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; color: var(--mu); }
.tgl.on { background: var(--navy); border-color: var(--navy); color: #fff; }
.ctr { display: flex; align-items: center; border: 1.5px solid var(--brd); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
.cb { width: 44px; height: 44px; background: var(--bg); border: none; font-size: 20px; cursor: pointer; color: var(--navy); font-weight: 700; }
.cv { flex: 1; text-align: center; font-size: 20px; font-weight: 700; color: var(--navy); }
.rrow { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.rrow .inp { margin-bottom: 0; }
.rmb { background: none; border: none; font-size: 18px; color: var(--mu2); cursor: pointer; padding: 4px; flex-shrink: 0; }
.addrb { background: none; border: 1.5px dashed var(--brd); border-radius: 10px; width: 100%; padding: 10px; font-size: 13px; color: var(--purple); font-family: inherit; cursor: pointer; margin-bottom: 14px; }
.sgrid { display: grid; gap: 8px; padding: 16px 20px; }
.scell { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.scirc { width: 100%; aspect-ratio: 1; border-radius: 50%; border: 2px solid var(--brd); display: flex; align-items: center; justify-content: center; font-size: 20px; background: var(--sur); cursor: pointer; }
.scirc.on { border-color: var(--navy); background: var(--pll); }
.sdate { font-size: 9px; color: var(--mu); text-align: center; line-height: 1.3; }
.sbtns { display: flex; gap: 3px; }
.sedit { font-size: 9px; background: var(--pl); color: var(--purple); border: none; border-radius: 5px; padding: 2px 5px; cursor: pointer; font-family: inherit; }
.sdel { font-size: 9px; background: #fdeaea; color: #c0392b; border: none; border-radius: 5px; padding: 2px 5px; cursor: pointer; font-family: inherit; }
.bfil {
  padding: 12px 16px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.fb {
  width: 100%;
  border-radius: 12px;
  padding: 10px 0;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  border: 1.5px solid var(--brd);
  font-family: inherit;
  background: var(--sur);
  color: var(--mu);
  white-space: nowrap;
}

.fb.on {
  background: var(--navy);
  border-color: var(--navy);
  color: #fff;
}
.fb { border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--brd); font-family: inherit; background: var(--sur); color: var(--mu); }
.fb.on { background: var(--navy); border-color: var(--navy); color: #fff; }
.bstit { padding: 8px 20px 4px; font-size: 13px; font-weight: 700; color: var(--navy); }
.bcard { margin: 0 20px 10px; background: var(--sur); border: 1.5px solid var(--brd); border-radius: 14px; padding: 14px 16px; }
.blocked { margin: 0 20px 8px; background: var(--bg); border: 1.5px solid var(--brd); border-radius: 14px; padding: 12px 16px; font-size: 13px; color: var(--mu); }
.cntrow { display: flex; gap: 8px; margin: 10px 0; }
.cntbox { flex: 1; border-radius: 10px; padding: 10px 8px; text-align: center; }
.cntbox .n { font-size: 22px; font-weight: 700; }
.cntbox .l { font-size: 10px; color: var(--mu); margin-top: 2px; }
.cok { background: var(--gnl); } .cok .n { color: var(--gn); }
.cno { background: var(--bg); } .cno .n { color: var(--mu); }
.actbtn { width: 100%; padding: 12px; border-radius: 10px; background: var(--navy); color: #fff; border: none; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; }
.actbtn:disabled { background: var(--brd); color: var(--mu); cursor: default; }
.rwitem { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 10px; margin-bottom: 6px; font-size: 13px; }
.rwdone { background: var(--gnl); } .rwdone .rc { color: var(--gn); font-weight: 700; }
.rwtodo { background: var(--bg); border: 1px solid var(--brd); } .rwtodo .rc { color: var(--mu); font-weight: 700; }
.calh { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.calm { font-size: 20px; font-weight: 700; color: var(--navy); }
.calnav { background: none; border: none; font-size: 22px; color: var(--navy); cursor: pointer; padding: 4px 10px; }
.calwd { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 4px; }
.calwd span { text-align: center; font-size: 11px; color: var(--mu); padding: 6px 0; font-weight: 600; }
.calgrid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 0 4px; gap: 1px; }
.calcell { min-height: 82px; display: flex; flex-direction: column; align-items: center; padding: 5px 2px 4px; border-radius: 8px; overflow: hidden; cursor: pointer; }
.calcell:hover { background: var(--pll); }
.calnum { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-bottom: 3px; font-weight: 500; flex-shrink: 0; }
.calcell.today .calnum { background: var(--navy); color: #fff; font-weight: 700; }
.calcell.faded .calnum { color: var(--mu2); }
.calposters { display: flex; flex-direction: column; gap: 2px; width: 100%; }
.calposter { width: 100%; border-radius: 4px; padding: 2px 4px; font-size: 9px; color: #fff; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pad-actions { display: flex; gap: 8px; margin-top: 10px; }
.pad-edit { flex: 1; padding: 7px; font-size: 12px; border-radius: 8px; background: var(--pl); color: var(--purple); border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.pad-del { flex: 1; padding: 7px; font-size: 12px; border-radius: 8px; background: #fdeaea; color: #c0392b; border: none; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn { width: 100%; padding: 12px; border-radius: 10px; background: var(--navy); color: #fff; border: none; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; display: block; }
.btn.danger { background: #c0392b; }
.btn.ghost { background: var(--bg); color: var(--mu); }
emoji-picker { width: 100%; height: 320px; border-radius: 14px; margin-bottom: 14px; }
.ck { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--tx); margin-bottom: 14px; cursor: pointer; }
#sc-benefit { padding-top: 0; overflow-y: auto; }
</style>
</head>
<body>
<div class="app">

<!-- 홈 -->
<div class="sc on" id="sc-home">
  <div style="padding:20px 20px 0;">
    <div style="font-size:28px;font-weight:700;color:var(--navy);">회전문 🎭</div>
    <div style="font-size:12px;color:var(--mu);margin-top:2px;">오늘도 회전문...</div>
  </div>
  <div id="home-banner" style="display:none;" class="banner">
    <div style="font-size:26px;">🎭</div>
    <div>
      <div id="banner-txt" style="font-size:14px;font-weight:700;color:var(--navy);"></div>
      <div style="font-size:11px;color:var(--mu);margin-top:2px;">관람 후 도장 적립을 잊지 마세요</div>
    </div>
  </div>
  <div class="stit">진행 중인 공연</div>
  <div id="home-list"></div>
</div>

<!-- 공연별 도장판 -->
<div class="sc" id="sc-show">
  <div class="tbar">
    <div class="bk" onclick="goBack()">←</div>
    <h2 id="show-title"></h2>
    <button class="rbtn" onclick="openAddPad()">+ 도장판</button>
  </div>
  <div class="stit" id="show-sub"></div>
  <div id="show-list"></div>
</div>

<!-- 도장판 상세 -->
<div class="sc" id="sc-detail">
  <div class="tbar">
    <div class="bk" onclick="goBack()">←</div>
    <h2>도장판 상세</h2>
    <button class="rbtn" onclick="openStampModal()">+ 도장</button>
  </div>
  <div style="padding:20px 20px 0;text-align:center;">
    <div id="d-show" style="font-size:13px;color:var(--mu);"></div>
    <div id="d-pad" style="font-size:20px;font-weight:700;color:var(--navy);margin:4px 0;"></div>
    <div id="d-goal" style="font-size:12px;color:var(--purple);"></div>
  </div>
  <div class="stit">도장 현황</div>
  <div id="d-stamps" class="sgrid"></div>
  <div class="stit">혜택 단계</div>
  <div id="d-rewards" style="padding:0 20px 20px;"></div>
</div>

<!-- 캘린더 -->
<div class="sc" id="sc-cal">
  <div class="calh">
    <button class="calnav" onclick="changeMonth(-1)">‹</button>
    <div class="calm" id="cal-label"></div>
    <button class="calnav" onclick="changeMonth(1)">›</button>
  </div>
  <div class="calwd">
    <span style="color:#C0392B;">일</span><span>월</span><span>화</span>
    <span>수</span><span>목</span><span>금</span><span style="color:#2A5FA8;">토</span>
  </div>
  <div class="calgrid" id="cal-grid"></div>
  <div style="padding:16px 20px;">
    <button class="actbtn" id="cal-reg-btn">관람 일정 등록하기</button>
  </div>
</div>

<!-- 혜택 -->
<div class="sc" id="sc-benefit">
  <div class="tbar" style="position:sticky;top:0;z-index:10;"><h2>혜택 관리</h2></div>
  <div class="bfil">
    <button class="fb on" onclick="filterB('all',this)">전체</button>
    <button class="fb" onclick="filterB('ok',this)">사용 가능</button>
    <button class="fb" onclick="filterB('used',this)">사용 완료</button>
    <button class="fb" onclick="filterB('locked',this)">미달성</button>
  </div>
  <div id="b-list"></div>
  <div style="padding:0 20px 12px;">
    <div class="addcard" style="margin:0;" onclick="openManualBenefit()">+ 혜택 직접 입력</div>
  </div>
</div>

<!-- 하단 네비 -->
<div class="bnav">
  <button class="ni on" onclick="navigate('home',this)"><div class="ni-ico">🏠</div><div class="ni-lbl">홈</div></button>
  <button class="ni" onclick="navigate('show-home',this)"><div class="ni-ico">🎯</div><div class="ni-lbl">도장판</div></button>
  <button class="ni" onclick="navigate('cal',this)"><div class="ni-ico">📅</div><div class="ni-lbl">캘린더</div></button>
  <button class="ni" onclick="navigate('benefit',this)"><div class="ni-ico">🎁</div><div class="ni-lbl">혜택</div></button>
</div>
</div>

<!-- 모달: 공연 추가 -->
<div class="ov" id="m-add-show">
  <div class="modal">
    <h3>새 공연 추가</h3>
    <label class="lbl">공연명</label>
    <input class="inp" id="i-sname" placeholder="공연명을 입력해주세요.">
    <label class="lbl">장르</label>
    <select class="inp" id="i-sgenre">
      <option>뮤지컬</option><option>연극</option><option>기타</option>
    </select>
    <div class="brow">
      <button class="mbtn s" onclick="closeModal('m-add-show')">취소</button>
      <button class="mbtn p" onclick="addShow()">추가하기</button>
    </div>
  </div>
</div>

<!-- 모달: 보관함 -->
<div class="ov" id="m-archive">
  <div class="modal">
    <h3>📦 보관함</h3>
    <div id="archive-list"></div>
    <div class="brow" style="margin-top:16px;">
      <button class="mbtn s" onclick="closeModal('m-archive')">닫기</button>
    </div>
  </div>
</div>

<!-- 모달: 도장판 추가 -->
<div class="ov" id="m-add-pad">
  <div class="modal">
    <h3 id="pad-modal-title">새 도장판 만들기</h3>
    <input type="hidden" id="editing-pad-idx" value="-1">
    <label class="lbl">총 도장 칸 수</label>
    <div class="ctr">
      <button class="cb" onclick="changeCnt(-1)">−</button>
      <div class="cv" id="cnt-val">5</div>
      <button class="cb" onclick="changeCnt(1)">+</button>
    </div>
    <label class="lbl">도장 모양</label>
    <div style="margin-bottom:14px;">
      <div id="selected-emoji" style="font-size:40px;text-align:center;margin-bottom:10px;">🎭</div>
      <emoji-picker id="emoji-picker"></emoji-picker>
    </div>
    <label class="lbl">혜택 구간 설정</label>
    <div id="rew-rows"></div>
    <button class="addrb" onclick="addRewRow('rew-rows')">+ 혜택 구간 추가</button>
    <button class="addrb" style="color:var(--mu);" onclick="copyRewards()">⟳ 같은 공연 혜택 불러오기</button>
    <div class="brow">
      <button class="mbtn s" onclick="closeModal('m-add-pad')">취소</button>
      <button class="mbtn p" onclick="savePad()">저장하기</button>
    </div>
  </div>
</div>

<!-- 모달: 도장 찍기 -->
<div class="ov" id="m-stamp">
  <div class="modal">
    <h3>도장 찍기</h3>
    <label class="lbl">관람 날짜</label>
    <input class="inp" type="date" id="s-date">
    <label class="lbl">낮공 / 밤공</label>
    <div class="trow">
      <button class="tgl on" id="s-day" onclick="setTime('stamp','day')">🌤 낮공</button>
      <button class="tgl" id="s-night" onclick="setTime('stamp','night')">🌙 밤공</button>
    </div>
    <label class="lbl">적립 개수</label>
    <div class="trow" id="stamp-cnt-row">
      <button class="tgl on" onclick="selectStampCnt(this,1)">1개</button>
      <button class="tgl" onclick="selectStampCnt(this,2)">더블 ×2</button>
      <button class="tgl" onclick="selectStampCnt(this,3)">트리플 ×3</button>
    </div>
    <label class="ck">
      <input type="checkbox" id="s-calendar" checked>
      <span>캘린더 일정에도 등록하기</span>
    </label>
    <label class="lbl" style="margin-top:14px;">MEMO (선택)</label>
    <input class="inp" id="s-memo" placeholder="ex) 도장 교환">
    <div class="brow">
      <button class="mbtn s" onclick="closeModal('m-stamp')">취소</button>
      <button class="mbtn p" onclick="doStamp()">도장 찍기!</button>
    </div>
  </div>
</div>

<!-- 모달: 도장 수정 -->
<div class="ov" id="m-edit-stamp">
  <div class="modal">
    <h3>도장 수정</h3>
    <input type="hidden" id="edit-stamp-idx">
    <label class="lbl">관람 날짜</label>
    <input class="inp" type="date" id="e-date">
    <label class="lbl">낮공 / 밤공</label>
    <div class="trow">
      <button class="tgl on" id="e-day" onclick="setTime('edit','day')">🌤 낮공</button>
      <button class="tgl" id="e-night" onclick="setTime('edit','night')">🌙 밤공</button>
    </div>
    <label class="lbl">메모</label>
    <input class="inp" id="e-memo">
    <div class="brow">
      <button class="mbtn s" onclick="closeModal('m-edit-stamp')">취소</button>
      <button class="mbtn p" onclick="saveStampEdit()">저장하기</button>
    </div>
  </div>
</div>

<!-- 모달: 관람 등록 -->
<div class="ov" id="m-record">
  <div class="modal">
    <h3>관람 등록</h3>
    <label class="lbl">공연 선택</label>
    <select class="inp" id="r-show" onchange="updatePadSel()"></select>
    <label class="lbl">도장판 선택</label>
    <select class="inp" id="r-pad"></select>
    <label class="lbl">관람 날짜</label>
    <input class="inp" type="date" id="r-date">
    <label class="lbl">낮공 / 밤공</label>
    <div class="trow">
      <button class="tgl on" id="r-day" onclick="setTime('rec','day')">🌤 낮공</button>
      <button class="tgl" id="r-night" onclick="setTime('rec','night')">🌙 밤공</button>
    </div>
    <label class="lbl">적립 방식</label>
    <div class="trow" id="record-cnt-row">
      <button class="tgl on" onclick="selectRecordCnt(this,1)">일반 ×1</button>
      <button class="tgl" onclick="selectRecordCnt(this,2)">더블 ×2</button>
      <button class="tgl" onclick="selectRecordCnt(this,3)">트리플 ×3</button>
    </div>
    <label class="lbl">티켓 가격</label>
    <input class="inp" type="number" id="r-price" placeholder="예) 99000">

    <input class="inp" id="r-memo" placeholder="오늘도 너무 좋았어...">
    <div class="brow">
      <button class="mbtn s" onclick="closeModal('m-record')">취소</button>
      <button class="mbtn p" onclick="addRecord()">등록하기</button>

</div>

  <div class="modal">

    <label class="lbl">개수</label>
    <input class="inp" type="number" id="b-count" value="1" min="1">

      <button class="mbtn s" onclick="closeModal('m-add-benefit')">취소</button>
      <button class="mbtn p" onclick="addManualB()">추가하기</button>
    </div>
  </div>
</div>

<div class="ov" id="m-stamp-detail">
  <div class="modal">
    <h3>관람 기록</h3>
    <div id="stamp-detail-body" style="margin-bottom:16px;"></div>
    <button class="btn" id="stamp-edit-btn" style="margin-bottom:8px;">수정</button>
    <button class="btn danger" id="stamp-delete-btn" style="margin-bottom:8px;">삭제</button>
    <button class="btn ghost" onclick="closeModal('m-stamp-detail')">닫기</button>
  </div>
</div>

<script>
var COLORS = ['#4a3580','#1a4060','#5c2a10','#1f5040','#5c3a00','#3a1f60','#8b2252'];

var db = JSON.parse(localStorage.getItem('cc6') || 'null') || { shows: [], manualB: [], archived: [] };
function save() { localStorage.setItem('cc6', JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function getShow(id) { return db.shows.find(function(s){ return s.id === id; }); }
function particle(word, type) {
  var lastChar = word.charCodeAt(word.length - 1);
  var hasBatchim = (lastChar - 44032) % 28 !== 0;

  var particles = {
    '을를': hasBatchim ? '을' : '를',
    '이가': hasBatchim ? '이' : '가',
    '은는': hasBatchim ? '은' : '는',
    '와과': hasBatchim ? '과' : '와',
    '으로로': hasBatchim ? '으로' : '로'
  };

  return word + particles[type];
}

var curShow = null, curPad = null;
var stack = ['home'];
var padCnt = 5, selEmoji = '🎭';
var times = { stamp: 'day', rec: 'day', edit: 'day' };
var editStampIdx = null;
var calY, calM;
var stampCnt = 1;
var recordStampCnt = 1;
var selectedStampRecord = null;
var benefitCollapsed = {};
var currentBenefitFilter = 'all';

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.ov').forEach(function(o) {
  o.addEventListener('click', function(e) { if (e.target === o) closeModal(o.id); });
});

function setTime(ctx, t) {
  times[ctx] = t;
  if (ctx === 'stamp') {
    document.getElementById('s-day').classList.toggle('on', t === 'day');
    document.getElementById('s-night').classList.toggle('on', t === 'night');
  } else if (ctx === 'rec') {
    document.getElementById('r-day').classList.toggle('on', t === 'day');
    document.getElementById('r-night').classList.toggle('on', t === 'night');
  } else if (ctx === 'edit') {
    document.getElementById('e-day').classList.toggle('on', t === 'day');
    document.getElementById('e-night').classList.toggle('on', t === 'night');
  }
}

function today() { return new Date().toISOString().split('T')[0]; }

function initEpicker() {
  var picker = document.getElementById('emoji-picker');
  var preview = document.getElementById('selected-emoji');
  if (!picker.dataset.bound) {
    picker.addEventListener('emoji-click', function(e) {
      selEmoji = e.detail.unicode;
      preview.textContent = selEmoji;
    });
    picker.dataset.bound = '1';
  }
  preview.textContent = selEmoji;
}

function showSc(id) {
  document.querySelectorAll('.sc').forEach(function(s) { s.classList.remove('on'); });
  document.getElementById('sc-' + id).classList.add('on');
  document.getElementById('sc-' + id).scrollTop = 0;
}

function navigate(tab, btn) {
  document.querySelectorAll('.ni').forEach(function(b) { b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  stack = [tab];
  if (tab === 'home' || tab === 'show-home') { renderHome(); showSc('home'); }
  else if (tab === 'cal') { initCal(); showSc('cal'); }
  else if (tab === 'benefit') { renderB('all'); showSc('benefit'); }
}

function goBack() {
  stack.pop();
  var prev = stack[stack.length - 1];
  if (prev === 'home' || prev === 'show-home') { renderHome(); showSc('home'); }
  else if (prev === 'show') { renderShowSc(); showSc('show'); }
}

// ════════════════════════════════════════
// 홈
// ════════════════════════════════════════
function renderHome() {
  var c = document.getElementById('home-list'), html = '';
  if (!c) return;
  var activeShows = (db.shows || []).filter(function(s) { return !s.archived; });
  if (activeShows.length === 0) {
    html += '<div style="text-align:center;padding:30px 20px;color:var(--mu);font-size:13px;">등록된 공연이 없어요.</div>';
  } else {
    activeShows.forEach(function(s) {
      var padCount = (s.pads || []).length;
      html += '<div class="card" onclick="goShow(\'' + s.id + '\')" style="padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">' +
        '<div>' +
        '<div style="font-weight:700;color:var(--navy);font-size:15px;">' + s.name + '</div>' +
        '<div style="color:var(--mu);font-size:11px;margin-top:3px;display:flex;align-items:center;gap:6px;">' +
        '<span>' + (s.genre || '뮤지컬') + '</span>' +
        '<span style="color:var(--brd);">|</span>' +
        '<span style="color:var(--navy);font-weight:700;">도장판 ' + padCount + '개</span>' +
        '</div>' +
        '</div>' +
        '<div style="margin-top:10px;display:flex;gap:6px;">' +
        '<button onclick="event.stopPropagation();archiveShow(\'' + s.id + '\')" style="flex:1;padding:7px;font-size:12px;border-radius:8px;background:var(--pl);color:var(--purple);border:none;cursor:pointer;font-family:inherit;font-weight:600;">📦 보관</button>' +
        '<button onclick="event.stopPropagation();deleteShow(\'' + s.id + '\')" style="flex:1;padding:7px;font-size:12px;border-radius:8px;background:#fdeaea;color:#c0392b;border:none;cursor:pointer;font-family:inherit;font-weight:600;">🗑 삭제</button>' +
        '</div></div>';
    });
  }
  html += '<div style="margin:10px 20px 8px;">' +
    '<button onclick="openModal(\'m-add-show\')" style="width:100%;padding:10px;background:var(--navy);color:white;border:none;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;">+ 새 공연 추가</button>' +
    '</div>';
  // ✅ 보관함 버튼 하나만 유지
  html += '<div style="margin:0 20px 20px;">' +
    '<button onclick="openArchive()" style="width:100%;padding:8px;background:none;border:1px solid var(--brd);border-radius:8px;color:var(--mu);font-size:11px;cursor:pointer;">📦 보관함 보기</button>' +
    '</div>';
  c.innerHTML = html;
  renderTodayBanner();
}

function renderTodayBanner() {
  var banner = document.getElementById('home-banner');
  var txt = document.getElementById('banner-txt');

  if (!banner || !txt) return;

  var td = today();

  var todayShows = [];

  db.shows.forEach(function(s) {
    (s.pads || []).forEach(function(p) {
      (p.records || []).forEach(function(r) {

        if (r.date === td) {

          var label =
            (r.time === 'night' ? '🌙 밤공' : '🌤 낮공') +
            ' · ' + s.name;

          if (todayShows.indexOf(label) === -1) {
  todayShows.push(label);
}
        }

      });
    });
  });

  if (!todayShows.length) {
    banner.style.display = 'none';
    return;
  }

  banner.style.display = 'flex';

  txt.innerHTML =
    '오늘 ' +
    todayShows.join('<br>') +
    ' 관람이 있어요!';
}

function addShow() {
  var nameEl = document.getElementById('i-sname');
  var genreEl = document.getElementById('i-sgenre');
  if (!nameEl) return;
  var name = nameEl.value.trim();
  var genre = genreEl ? genreEl.value : '';
  if (!name) { alert('공연명을 입력해주세요'); return; }
  db.shows.push({ id: uid(), name: name, genre: genre, pads: [], archived: false });
  save(); closeModal('m-add-show'); nameEl.value = ''; renderHome();
}

function deleteShow(id) {
  var s = getShow(id); if (!s) return;
  if (!confirm(
  particle('"' + s.name + '"', '을를') +
  ' 삭제할까요?\n모든 도장판과 혜택 기록이 삭제됩니다.'
)) return;
  db.manualB = db.manualB.filter(function(b) { return b.sid !== id; });
  db.shows = db.shows.filter(function(x) { return x.id !== id; });
  save(); renderHome();
}

function archiveShow(id) {
  var s = getShow(id); if (!s) return;
if (!confirm(
  particle('"' + s.name + '"', '을를') +
  ' 보관할까요?'
)) return;
  s.archived = true;
  save(); renderHome();
}

function openArchive() {
  var archived = db.shows.filter(function(s) { return s.archived; });
  var c = document.getElementById('archive-list');
  if (!archived.length) {
    c.innerHTML = '<div style="text-align:center;padding:30px 0;color:var(--mu);font-size:14px;">보관된 공연이 없어요</div>';
  } else {
    c.innerHTML = archived.map(function(s) {
      var totalPads = s.pads.length;
      var donePads = s.pads.filter(function(p) { return (p.records||[]).length >= p.total; }).length;
      return '<div style="background:var(--bg);border-radius:12px;padding:14px;margin-bottom:10px;">' +
        '<div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;">' + s.name + '</div>' +
        '<div style="font-size:12px;color:var(--mu);margin-bottom:10px;">도장판 ' + totalPads + '개 · 완료 ' + donePads + '개</div>' +
        '<div style="display:flex;gap:6px;">' +
        '<button onclick="unarchiveShow(\'' + s.id + '\')" style="flex:1;padding:7px;font-size:12px;border-radius:8px;background:var(--pl);color:var(--purple);border:none;cursor:pointer;font-family:inherit;font-weight:600;">↩ 복원</button>' +
        '<button onclick="deleteShow(\'' + s.id + '\')" style="flex:1;padding:7px;font-size:12px;border-radius:8px;background:#fdeaea;color:#c0392b;border:none;cursor:pointer;font-family:inherit;font-weight:600;">🗑 삭제</button>' +
        '</div></div>';
    }).join('');
  }
  openModal('m-archive');
}

function unarchiveShow(id) {
  var s = getShow(id); if (!s) return;
  s.archived = false;
  save(); renderHome(); openArchive();
}

// ════════════════════════════════════════
// 공연별 도장판 목록
// ════════════════════════════════════════
function renderShowSc() {
  var s = getShow(curShow); if (!s) return;
  document.getElementById('show-title').textContent = s.name;
  document.getElementById('show-sub').textContent = '도장판 ' + s.pads.length + '개';
  var c = document.getElementById('show-list');
  if (!s.pads.length) {
    c.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--mu);font-size:14px;">도장판이 없어요<br>우측 상단 버튼으로 추가해보세요</div>';
    return;
  }
  c.innerHTML = s.pads.map(function(p, i) {
    var recs = p.records || [], filled = recs.length;
    var dots = Array.from({ length: p.total }, function(_, j) {
      var on = j < filled;
      var click = on ? 'onclick="event.stopPropagation();openStampRecord(' + db.shows.indexOf(s) + ',' + i + ',' + j + ')"' : '';
      return '<div ' + click + ' style="width:26px;height:26px;border-radius:50%;border:2px solid ' + (on ? 'var(--navy)' : 'var(--brd)') + ';display:inline-flex;align-items:center;justify-content:center;font-size:13px;background:' + (on ? 'var(--pll)' : 'var(--sur)') + ';cursor:' + (on ? 'pointer' : 'default') + ';">' + (on ? p.emoji : '') + '</div>';
    }).join('');
    var rewText = p.rewards.map(function(r) { return r.n + '회 → ' + r.label; }).join(' · ') || '혜택 미설정';
    return '<div class="card">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;" onclick="goDet(\'' + curShow + '\',' + i + ')">' +
      '<div style="font-size:15px;font-weight:700;color:var(--navy);">도장판 #' + (i+1) + (filled >= p.total ? ' ✓' : '') + '</div>' +
      '<div style="font-size:12px;color:var(--mu);">' + filled + '/' + p.total + '</div></div>' +
      '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;" onclick="goDet(\'' + curShow + '\',' + i + ')">' + dots + '</div>' +
      '<div style="font-size:11px;color:var(--mu);margin-bottom:10px;" onclick="goDet(\'' + curShow + '\',' + i + ')">' + rewText + '</div>' +
      '<div class="pad-actions">' +
      '<button class="pad-edit" onclick="openEditPad(' + i + ')">✏️ 수정</button>' +
      '<button class="pad-del" onclick="deletePad(' + i + ')">🗑 삭제</button>' +
      '</div></div>';
  }).join('');
}

function goShow(id) {
  curShow = id;
  stack.push('show');
  renderShowSc();
  showSc('show');
}

// ════════════════════════════════════════
// 도장판 추가 / 수정
// ════════════════════════════════════════
function openAddPad() {
  document.getElementById('pad-modal-title').textContent = '새 도장판 만들기';
  document.getElementById('editing-pad-idx').value = '-1';
  padCnt = 5; selEmoji = '🎭';
  document.getElementById('cnt-val').textContent = 5;
  document.getElementById('rew-rows').innerHTML = '';
  addRewRow('rew-rows'); initEpicker(); openModal('m-add-pad');
}

function openEditPad(idx) {
  var s = getShow(curShow), p = s && s.pads[idx]; if (!p) return;
  document.getElementById('pad-modal-title').textContent = '도장판 수정';
  document.getElementById('editing-pad-idx').value = idx;
  padCnt = p.total; selEmoji = p.emoji || '🎭';
  document.getElementById('cnt-val').textContent = padCnt;
  var c = document.getElementById('rew-rows'); c.innerHTML = '';
  p.rewards.forEach(function(r) {
    var row = document.createElement('div'); row.className = 'rrow';
    row.innerHTML =
  '<input class="inp" type="number" value="' + r.n + '" style="width:70px;flex-shrink:0;">' +

  '<input class="inp" value="' + r.label + '">' +

  '<input class="inp" type="number" value="' + (r.count || 1) + '" min="1" style="width:70px;flex-shrink:0;">' +

  '<button class="rmb" onclick="this.parentElement.remove()">✕</button>';
    c.appendChild(row);
  });
  initEpicker(); openModal('m-add-pad');
}

function changeCnt(d) { padCnt = Math.max(1, Math.min(20, padCnt + d)); document.getElementById('cnt-val').textContent = padCnt; }

function addRewRow(cid) {
  var c = document.getElementById(cid);
  var row = document.createElement('div');
  row.className = 'rrow';
  row.innerHTML =
    '<input class="inp" type="number" placeholder="회차" min="1" style="width:70px;flex-shrink:0;">' +
    '<input class="inp" placeholder="혜택 내용">' +
    '<input class="inp" type="number" placeholder="개수" min="1" value="1" style="width:70px;flex-shrink:0;">' +
    '<button class="rmb" onclick="this.parentElement.remove()">✕</button>';
  c.appendChild(row);
}

function copyRewards() {
  var s = getShow(curShow);
  if (!s || !s.pads.length) { alert('다른 도장판이 없어요'); return; }
  var src = s.pads.find(function(p) { return p.rewards && p.rewards.length; });
  if (!src) { alert('혜택이 설정된 도장판이 없어요'); return; }
  var c = document.getElementById('rew-rows'); c.innerHTML = '';
  src.rewards.forEach(function(r) {
    var row = document.createElement('div'); row.className = 'rrow';
    row.innerHTML = '<input class="inp" type="number" value="' + r.n + '" style="width:70px;flex-shrink:0;"><input class="inp" value="' + r.label + '"><button class="rmb" onclick="this.parentElement.remove()">✕</button>';
    c.appendChild(row);
  });
}

function savePad() {
  var s = getShow(curShow); if (!s) return;
  var rows = document.querySelectorAll('#rew-rows .rrow'), rewards = [];
  rows.forEach(function(row) {
    var ins = row.querySelectorAll('input');
   var n = parseInt(ins[0].value);
var label = ins[1].value.trim();
var count = parseInt(ins[2].value) || 1;

if (n && label) {
  rewards.push({
    n: n,
    label: label,
    count: count
  });
}
  });
  var editIdx = parseInt(document.getElementById('editing-pad-idx').value);
  if (editIdx >= 0) {
    var p = s.pads[editIdx]; if (!p) return;
    p.total = padCnt; p.emoji = selEmoji; p.rewards = rewards;
    if (p.records && p.records.length > p.total) p.records = p.records.slice(0, p.total);
  } else {
    s.pads.push({ total: padCnt, emoji: selEmoji, rewards: rewards, records: [] });
  }
  save(); closeModal('m-add-pad'); renderShowSc();
}

function deletePad(idx) {
  if (!confirm('도장판 #' + (idx+1) + '을 삭제할까요?')) return;
  var s = getShow(curShow); if (!s) return;
  db.manualB = db.manualB.filter(function(b) { return !(b.sid === curShow && b.pi === idx); });
  s.pads.splice(idx, 1);
  db.manualB.forEach(function(b) { if (b.sid === curShow && b.pi > idx) b.pi--; });
  save(); renderShowSc();
}

// ════════════════════════════════════════
// 도장판 상세
// ════════════════════════════════════════
function goDet(sid, pi) { curShow = sid; curPad = pi; stack.push('detail'); renderDet(); showSc('detail'); }

function renderDet() {
  var s = getShow(curShow), p = s && s.pads[curPad]; if (!p) return;
  document.getElementById('d-show').textContent = s.name;
  document.getElementById('d-pad').textContent = '도장판 #' + (curPad + 1);
  document.getElementById('d-goal').textContent = p.rewards.map(function(r) { return r.n + '회 → ' + r.label +
  ((r.count && r.count > 1) ? ' ×' + r.count : ''); }).join(' · ') || '혜택 미설정';
  var recs = (p.records || []).slice().sort(function(a, b) { return a.date.localeCompare(b.date); });
  var cols = Math.min(p.total, 5);
  var dc = document.getElementById('d-stamps');
  dc.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  dc.innerHTML = Array.from({ length: p.total }, function(_, i) {
    if (i < recs.length) {
      var r = recs[i];
      var origIdx = (p.records || []).findIndex(function(rec) { return rec.date === r.date && rec.time === r.time && rec.memo === r.memo; });
      return '<div class="scell"><div class="scirc on">' + p.emoji + '</div>' +
        '<div class="sdate">' + r.date.slice(5) + '<br>' + (r.time === 'night' ? '🌙' : '🌤') + '</div>' +
        (r.memo ? '<div class="sdate" style="color:var(--purple);">' + r.memo.slice(0, 6) + '</div>' : '') +
        '<div class="sbtns"><button class="sedit" onclick="openEditStamp(' + origIdx + ')">수정</button>' +
        '<button class="sdel" onclick="deleteStamp(' + origIdx + ')">✕</button></div></div>';
    }
    return '<div class="scell"><div class="scirc"></div><div class="sdate">—</div></div>';
  }).join('');
  var filled = recs.length, rc = document.getElementById('d-rewards');
  if (!p.rewards.length) { rc.innerHTML = '<div style="color:var(--mu);font-size:13px;padding:10px 0;">혜택이 설정되지 않았어요</div>'; return; }
  rc.innerHTML = p.rewards.map(function(r) {
    var done = filled >= r.n;
    return '<div class="rwitem ' + (done ? 'rwdone' : 'rwtodo') + '"><span class="rc">' + r.n + '회</span><span style="flex:1;">' + r.label + '</span>' +
      (done ? '<span style="color:var(--gn);">✓ 달성!</span>' : '<span style="color:var(--mu);font-size:12px;">' + (r.n - filled) + '개 남음</span>') + '</div>';
  }).join('');
}

// ════════════════════════════════════════
// 도장 찍기
// ════════════════════════════════════════
function selectStampCnt(btn, n) {
  stampCnt = n;
  document.querySelectorAll('#stamp-cnt-row .tgl').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
}

function openStampModal() {
  document.getElementById('s-date').value = today();
  setTime('stamp', 'day');
  document.getElementById('s-memo').value = '';
  stampCnt = 1;
  document.querySelectorAll('#stamp-cnt-row .tgl').forEach(function(b, i) { b.classList.toggle('on', i === 0); });
  openModal('m-stamp');
}

function doStamp() {
  var s = getShow(curShow), p = s && s.pads[curPad]; if (!p) return;
  if (!p.records) p.records = [];
  var remaining = p.total - p.records.length;
  if (remaining <= 0) { alert('도장판이 이미 완성됐어요!'); return; }
  var date = document.getElementById('s-date').value;
  var memo = document.getElementById('s-memo').value.trim();
  var useCalendar = document.getElementById('s-calendar').checked;
  if (!date) { alert('날짜를 입력해주세요'); return; }
  var toAdd = Math.min(stampCnt, remaining);
  for (var i = 0; i < toAdd; i++) {
    p.records.push({ date: date, time: times.stamp, memo: memo, calendar: useCalendar, multi: stampCnt });
  }
  checkRewards(curShow, curPad);
  var overflow = stampCnt - toAdd, carryMsg = '';
  if (overflow > 0) {
    var newPad = { total: p.total, emoji: p.emoji, rewards: JSON.parse(JSON.stringify(p.rewards)), records: [] };
    for (var j = 0; j < overflow; j++) {
      newPad.records.push({ date: date, time: times.stamp, memo: memo, calendar: useCalendar, multi: stampCnt });
    }
    s.pads.push(newPad);
    checkRewards(curShow, s.pads.length - 1);
    carryMsg = '\n\n🎉 남은 ' + overflow + '개는 새 도장판 #' + s.pads.length + '에 자동 이월됐어요!';
  }
  save(); closeModal('m-stamp'); renderDet(); renderShowSc();
  alert('✓ 도장 ' + toAdd + '개 적립! (' + p.records.length + '/' + p.total + ')' + carryMsg);
}

function openEditStamp(idx) {
  editStampIdx = idx;
  var p = getShow(curShow) && getShow(curShow).pads[curPad]; if (!p) return;
  var r = (p.records || [])[idx]; if (!r) return;
  document.getElementById('e-date').value = r.date;
  document.getElementById('e-memo').value = r.memo || '';
  setTime('edit', r.time || 'day');
  openModal('m-edit-stamp');
}

function saveStampEdit() {
  var p = getShow(curShow) && getShow(curShow).pads[curPad]; if (!p) return;
  var r = (p.records || [])[editStampIdx]; if (!r) return;
  r.date = document.getElementById('e-date').value;
  r.time = times.edit;
  r.memo = document.getElementById('e-memo').value.trim();
  save(); closeModal('m-edit-stamp'); renderDet(); renderShowSc();
}

function deleteStamp(idx) {
  if (!confirm('이 도장을 삭제할까요?')) return;
  var p = getShow(curShow) && getShow(curShow).pads[curPad]; if (!p) return;
  p.records.splice(idx, 1);
  save(); renderDet(); renderShowSc();
}

function openStampRecord(si, pi, ri) {
  var s = db.shows[si], p = s.pads[pi], r = p.records[ri]; if (!r) return;
  selectedStampRecord = { si: si, pi: pi, ri: ri };
  document.getElementById('stamp-detail-body').innerHTML =
    '<div style="line-height:1.8;">' +
    '<div style="font-size:20px;font-weight:800;">' + s.name + '</div>' +
    '<div>📅 ' + r.date + '</div>' +
    '<div>' + (r.time === 'night' ? '🌙 밤공' : '🌤 낮공') + '</div>' +
    '<div>🎟 ' + (r.multi === 3 ? '트리플 적립' : r.multi === 2 ? '더블 적립' : '일반 적립') + '</div>' +
    (r.memo ? '<div>📝 ' + r.memo + '</div>' : '') +
    '</div>';
  document.getElementById('stamp-delete-btn').onclick = deleteStampRecord;
  document.getElementById('stamp-edit-btn').onclick = editStampRecord;
  openModal('m-stamp-detail');
}

function deleteStampRecord() {
  if (!selectedStampRecord) return;
  var si = selectedStampRecord.si, pi = selectedStampRecord.pi, ri = selectedStampRecord.ri;
  if (!confirm('이 기록을 삭제할까요?')) return;
  db.shows[si].pads[pi].records.splice(ri, 1);
  save(); closeModal('m-stamp-detail'); renderHome(); renderShowSc(); renderB('all'); initCal();
}

function editStampRecord() {
  if (!selectedStampRecord) return;
  var si = selectedStampRecord.si, pi = selectedStampRecord.pi, ri = selectedStampRecord.ri;
  var r = db.shows[si].pads[pi].records[ri];
  var memo = prompt('메모 수정', r.memo || '');
  if (memo === null) return;
  r.memo = memo;
  save(); openStampRecord(si, pi, ri); renderHome(); renderShowSc(); renderB('all'); initCal();
}

// ════════════════════════════════════════
// 관람 등록
// ════════════════════════════════════════
function selectRecordCnt(btn, n) {
  recordStampCnt = n;
  document.querySelectorAll('#record-cnt-row .tgl').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
}

function updatePadSel() {
  var sid = document.getElementById('r-show').value, s = getShow(sid);
  document.getElementById('r-pad').innerHTML = (s ? s.pads : []).map(function(p, i) {
    return '<option value="' + i + '">도장판 #' + (i+1) + ' (' + (p.records||[]).length + '/' + p.total + ')</option>';
  }).join('');
}

function openRecordModal() {
  var activeShows = db.shows.filter(function(s) { return !s.archived; });
  var c = document.getElementById('r-show');
  c.innerHTML = activeShows.map(function(s) {
    return '<option value="' + s.id + '">' + s.name + '</option>';
  }).join('');
  updatePadSel();
  document.getElementById('r-date').value = today();
  setTime('rec', 'day');
  recordStampCnt = 1;
  document.querySelectorAll('#record-cnt-row .tgl').forEach(function(b, i) { b.classList.toggle('on', i === 0); });
  openModal('m-record');
}

function addRecord() {
  var sid = document.getElementById('r-show').value;
  var pi = parseInt(document.getElementById('r-pad').value);
  var date = document.getElementById('r-date').value;
  var price = parseInt(document.getElementById('r-price').value) || 0;
  var memo = document.getElementById('r-memo').value.trim();
  if (!sid || isNaN(pi) || !date) { alert('필수 항목을 입력해주세요'); return; }
  var s = getShow(sid); if (!s) return;
  var p = s.pads[pi]; if (!p) return;
  if (!p.records) p.records = [];
  var remaining = p.total - p.records.length;
  var toAdd = Math.min(recordStampCnt, remaining);
  for (var i = 0; i < toAdd; i++) {
    p.records.push({ date: date, time: times.rec, price: price, memo: memo, multi: recordStampCnt, calendar: true });
  }
  checkRewards(sid, pi);
  var overflow = recordStampCnt - toAdd;
  if (overflow > 0) {
    if (confirm('현재 도장판이 가득 찼어요.\n새 도장판을 자동 생성할까요?')) {
      var newPad = { total: p.total, emoji: p.emoji, rewards: JSON.parse(JSON.stringify(p.rewards)), records: [] };
      for (var j = 0; j < overflow; j++) {
        newPad.records.push({ date: date, time: times.rec, price: price, memo: memo, multi: recordStampCnt, calendar: true });
      }
      s.pads.push(newPad);
      checkRewards(sid, s.pads.length - 1);
    }
  }
  save(); closeModal('m-record');
  document.getElementById('r-price').value = '';
  document.getElementById('r-memo').value = '';
  renderHome(); renderShowSc(); renderB('all'); initCal();
  alert('✓ 관람 등록 완료!');
}

// ════════════════════════════════════════
// 혜택 달성 체크 — 도장판 저장 시 자동 연동
// ════════════════════════════════════════
function checkRewards(sid, pi) {
  var s = getShow(sid), p = s && s.pads[pi]; if (!p) return;
  var filled = (p.records || []).length;
  (p.rewards || []).forEach(function(r) {
    if (filled >= r.n) {
      var exists = db.manualB.find(function(b) {
        return b.sid === sid && b.pi === pi && b.label === r.label && b.auto;
      });
      if (!exists) {
        db.manualB.push({ id: uid(), sid: sid, pi: pi, label: r.label, total: r.count || 1, used: false, auto: true });
      }
    }
  });
}

// ════════════════════════════════════════
// 캘린더
// ════════════════════════════════════════
function initCal() {
  var n = new Date(); calY = n.getFullYear(); calM = n.getMonth(); renderCal();
}

function changeMonth(d) {
  calM += d;
  if (calM > 11) { calM = 0; calY++; }
  if (calM < 0) { calM = 11; calY--; }
  renderCal();
}

function renderCal() {
  document.getElementById('cal-label').textContent = calY + '년 ' + (calM + 1) + '월';
  var first = new Date(calY, calM, 1).getDay();
  var days = new Date(calY, calM + 1, 0).getDate();
  var prev = new Date(calY, calM, 0).getDate();
  var td = today(), html = '';
  for (var i = 0; i < first; i++) {
    html += '<div class="calcell faded"><div class="calnum">' + (prev - first + 1 + i) + '</div></div>';
  }
  for (var d = 1; d <= days; d++) {
    var ds = calY + '-' + String(calM + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var isToday = (ds === td);
    var uniqueMap = {};
    db.shows.forEach(function(s, si) {
      s.pads.forEach(function(p, pi) {
        (p.records || []).forEach(function(r, ri) {
          if (r.date !== ds || !r.calendar) return;
          var key = s.name + '_' + r.time;
          if (!uniqueMap[key]) {
            uniqueMap[key] = { show: s.name, time: r.time, color: COLORS[si % COLORS.length], si: si, pi: pi, ri: ri };
          }
        });
      });
    });
    var recs = Object.values(uniqueMap);
    recs.sort(function(a, b) { return a.time === b.time ? 0 : a.time === 'day' ? -1 : 1; });
    var posHtml = recs.length ? '<div class="calposters">' + recs.map(function(item) {
      return '<div class="calposter" style="background:' + item.color + ';" onclick="openCalEdit(' + item.si + ',' + item.pi + ',' + item.ri + ')">' +
        (item.time === 'day' ? '🌤 ' : '🌙 ') + item.show + '</div>';
    }).join('') + '</div>' : '';
    html += '<div class="calcell' + (isToday ? ' today' : '') + '"><div class="calnum">' + d + '</div>' + posHtml + '</div>';
  }
  var rem = 42 - first - days;
  for (var j = 1; j <= rem; j++) {
    html += '<div class="calcell faded"><div class="calnum">' + j + '</div></div>';
  }
  document.getElementById('cal-grid').innerHTML = html;
}

function openCalEdit(si, pi, ri) {
  var s = db.shows[si], p = s.pads[pi], r = p.records[ri]; if (!r) return;
  selectedStampRecord = { si: si, pi: pi, ri: ri };
  document.getElementById('stamp-detail-body').innerHTML =
    '<div style="line-height:1.8;">' +
    '<div style="font-size:20px;font-weight:800;">' + s.name + '</div>' +
    '<div>📅 ' + r.date + '</div>' +
    '<div>' + (r.time === 'night' ? '🌙 밤공' : '🌤 낮공') + '</div>' +
    '<div>🎟 ' + (r.multi === 3 ? '트리플 적립' : r.multi === 2 ? '더블 적립' : '일반 적립') + '</div>' +
    (r.memo ? '<div>📝 ' + r.memo + '</div>' : '') +
    '</div>';
  document.getElementById('stamp-delete-btn').onclick = deleteStampRecord;
  document.getElementById('stamp-edit-btn').onclick = editStampRecord;
  openModal('m-stamp-detail');
}

// ════════════════════════════════════════
// 혜택 탭 — 도장판 혜택 자동 연동 포함
// ════════════════════════════════════════
function renderB(filter) {
  var c = document.getElementById('b-list');
  var html = '';

  var activeShows = (db.shows || []).filter(function(s) {
    return !s.archived;
  });

  activeShows.forEach(function(s) {

    var grouped = {};

    // 자동 혜택 묶기
    (s.pads || []).forEach(function(p) {
      var filled = (p.records || []).length;

      (p.rewards || []).forEach(function(r) {

        if (!grouped[r.label]) {
          grouped[r.label] = {
            label: r.label,
            total: 0,
            used: 0,
            locked: 0
          };
        }

        if (filled >= r.n) {
          grouped[r.label].total++;

          if (r.used) grouped[r.label].used++;
        } else {
          grouped[r.label].locked++;
        }

      });
    });

    // 수동 혜택
    (db.manualB || []).forEach(function(b) {

      if (b.sid !== s.id || b.auto) return;

      if (!grouped[b.label]) {
        grouped[b.label] = {
          label: b.label,
          total: 0,
          used: 0,
          locked: 0
        };
      }

      grouped[b.label].total += (b.total || 1);

      if (b.used) {
        grouped[b.label].used += (b.total || 1);
      }

    });

    var items = '';

    Object.values(grouped).forEach(function(g) {

      var remain = g.total - g.used;

var status;

if (g.total <= 0) {
  status = 'locked';
} else if (remain <= 0) {
  status = 'used';
} else {
  status = 'ok';
}

      if (filter !== 'all' && filter !== status) return;

      items +=
        '<div style="display:flex;align-items:center;gap:10px;background:#fff;border-radius:12px;padding:12px;margin-bottom:8px;">' +

          '<div style="flex:1;">' +

            '<div style="font-size:14px;font-weight:700;color:var(--tx);">' +
              g.label +
            '</div>' +

            '<div style="font-size:11px;color:var(--mu);margin-top:4px;">' +
              '총 ' + g.total + '개' +
            '</div>' +

            '<div style="font-size:11px;font-weight:700;color:' +
              (remain > 0 ? 'var(--gn)' : 'var(--mu)') +
              ';margin-top:3px;">' +

               (status === 'locked'
  ? '아직 달성하지 못했어요'
  : remain > 0
    ? '사용 가능 ' + remain + '개 남음'
    : '모두 사용 완료') +

            '</div>' +

          '</div>' +

           (
  status === 'locked'
    ? '<div style="font-size:11px;font-weight:700;color:var(--mu);">미달성</div>'
    : remain > 0
      ? '<button onclick="usePadReward(\'' + s.id + '\', \'' + g.label.replace(/'/g, "\\'") + '\')" style="font-size:11px;padding:6px 12px;border-radius:8px;background:var(--navy);color:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:700;">사용하기</button>'
      : '<div style="font-size:11px;font-weight:700;color:var(--mu);">완료</div>'
) +

        '</div>';

    });

    if (!items) return;

    var collapsed = benefitCollapsed[s.id];

    html +=
      '<div style="margin:0 20px 12px;border:1px solid var(--brd);border-radius:14px;overflow:hidden;">' +

        '<div onclick="toggleBenefitGroup(\'' + s.id + '\')" style="padding:14px 16px;background:#fff;display:flex;align-items:center;justify-content:space-between;cursor:pointer;">' +

          '<div style="font-size:15px;font-weight:800;color:var(--navy);">' +
            s.name +
          '</div>' +

          '<div style="font-size:12px;color:var(--mu);">' +
            (collapsed ? '펼치기 ▾' : '접기 ▴') +
          '</div>' +

        '</div>' +

        (
          collapsed
          ? ''
          : '<div style="padding:10px;background:#f9f9f9;border-top:1px solid #eee;">' +
              items +
            '</div>'
        ) +

      '</div>';

  });

  if (!html) {
    html =
      '<div style="text-align:center;padding:50px;color:var(--mu);font-size:13px;">해당하는 혜택이 없어요</div>';
  }

  c.innerHTML = html;
}

// ✅ 도장판 혜택 사용 처리
function usePadReward(sid, rewardLabel) {
  var s = getShow(sid);
  if (!s) return;

  var available = [];

  (s.pads || []).forEach(function(p) {
    var filled = (p.records || []).length;

    (p.rewards || []).forEach(function(r) {
      if (r.label === rewardLabel && filled >= r.n && !r.used) {
        available.push(r);
      }
    });
  });

  if (!available.length) {
    alert('사용 가능한 혜택이 없어요');
    return;
  }

  available[0].used = true;

  save();
  renderB(currentBenefitFilter);

  alert(
    '"' + rewardLabel + '" 사용 완료!\n\n남은 개수: ' + (available.length - 1) + '개'
  );
}

// ✅ 수동 입력 혜택 사용 처리
function useManualBById(id) {
  var b = db.manualB.find(function(x) { return x.id === id; });
  if (!b) return;
  if (!confirm(
  particle('"' + (b.label || b.name) + '"', '을를') +
  ' 사용 처리할까요?'
)) return;
  b.used = true;
  save(); renderB('all');
}

function filterB(filter, btn) {
  currentBenefitFilter = filter;

  document.querySelectorAll('.fb').forEach(function(b) {
    b.classList.remove('on');
  });

  btn.classList.add('on');

  renderB(filter);
}

function openManualBenefit() {
  document.getElementById('b-show').innerHTML = db.shows.map(function(s) {
    return '<option value="' + s.id + '">' + s.name + '</option>';
  }).join('');
  openModal('m-add-benefit');
}

function addManualB() {
  var sid = document.getElementById('b-show').value;
  var label = document.getElementById('b-name').value.trim();
  var total = parseInt(document.getElementById('b-count').value) || 1;
  if (!label) { alert('혜택 이름을 입력해주세요'); return; }
  db.manualB.push({ id: uid(), sid: sid, pi: -1, label: label, total: total, used: false, auto: false });
  save(); closeModal('m-add-benefit');
  document.getElementById('b-name').value = '';
  renderB('all');
}
function toggleBenefitGroup(id) {
  benefitCollapsed[id] = !benefitCollapsed[id];
  renderB(currentBenefitFilter);
}

// ════════════════════════════════════════
// 초기화
// ════════════════════════════════════════
document.getElementById('cal-reg-btn').addEventListener('click', openRecordModal);
renderHome();
initCal();
</script>
